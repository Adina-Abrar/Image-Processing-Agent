<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>AI Portrait Editor</title>

    <!-- Bootstrap -->

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet">

    <!-- Icons -->

    <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <!-- CSS -->

    <link
            rel="stylesheet"
            href="/static/css/style.css">

</head>

<body>

<div class="container-fluid py-4">

    <!-- ================= HEADER ================= -->

    <div class="text-center mb-4">

        <h1 class="fw-bold">

            AI Portrait Editor

        </h1>

        <p class="text-muted">

            Upload • Preview • Edit • Download

        </p>

    </div>

    <!-- ================= MAIN ================= -->

    <div class="row g-4">

        <!-- ========================================================= -->
        <!-- LEFT PANEL -->
        <!-- ========================================================= -->

        <div class="col-md-4">

            <div class="editor-card">

                <!-- Upload -->

                <h5 class="section-title">

                    <i class="fa-solid fa-upload"></i>

                    Upload Image

                </h5>

                <input
                        id="imageInput"
                        type="file"
                        class="form-control"
                        accept=".jpg,.jpeg,.png">

                <!-- Processing -->

                <div
                        id="loadingBox"
                        class="loading-box mt-3">

                    <div
                            class="spinner-border text-primary"
                            role="status">

                    </div>

                    <div class="mt-2">

                        Processing Image...

                    </div>

                </div>

                <hr>

                <!-- Backgrounds -->

                <h5 class="section-title">

                    <i class="fa-solid fa-image"></i>

                    Backgrounds

                </h5>

                <div class="background-grid">

                    <img src="/static/backgrounds/bg_1.jpg"
                         class="bg-thumb active">

                    <img src="/static/backgrounds/bg_2.jpg"
                         class="bg-thumb">

                    <img src="/static/backgrounds/bg_3.jpg"
                         class="bg-thumb">

                    <img src="/static/backgrounds/bg_4.jpg"
                         class="bg-thumb">

                    <img src="/static/backgrounds/bg_5.jpg"
                         class="bg-thumb">

                    <img src="/static/backgrounds/bg_6.jpg"
                         class="bg-thumb">

                </div>

                <hr>

                <!-- Zoom -->

                <h5 class="section-title">

                    <i class="fa-solid fa-magnifying-glass-plus"></i>

                    Zoom

                </h5>

                <input

                        id="zoomSlider"

                        class="form-range"

                        type="range"

                        min="20"

                        max="250"

                        value="100">

                <hr>

                <!-- Position -->

                <h5 class="section-title">

                    <i class="fa-solid fa-up-down-left-right"></i>

                    Position

                </h5>

                <div class="position-buttons">

                    <button
                            id="moveUp"
                            class="btn btn-outline-primary">

                        <i class="fa-solid fa-arrow-up"></i>

                    </button>

                    <div class="d-flex gap-2">

                        <button
                                id="moveLeft"
                                class="btn btn-outline-primary flex-fill">

                            <i class="fa-solid fa-arrow-left"></i>

                        </button>

                        <button
                                id="moveRight"
                                class="btn btn-outline-primary flex-fill">

                            <i class="fa-solid fa-arrow-right"></i>

                        </button>

                    </div>

                    <button
                            id="moveDown"
                            class="btn btn-outline-primary">

                        <i class="fa-solid fa-arrow-down"></i>

                    </button>

                </div>

                <hr>

                <!-- Actions -->

                <div class="d-grid gap-3">

                    <button

                            id="centerBtn"

                            class="btn btn-secondary">

                        <i class="fa-solid fa-crosshairs"></i>

                        Center Image

                    </button>

                    <button

                            id="resetBtn"

                            class="btn btn-warning">

                        <i class="fa-solid fa-rotate-left"></i>

                        Reset

                    </button>

                    <button

                            id="downloadBtn"

                            class="btn btn-success">

                        <i class="fa-solid fa-download"></i>

                        Download JPG

                    </button>

                </div>

            </div>

        </div>

        <!-- ========================================================= -->
        <!-- RIGHT PANEL -->
        <!-- ========================================================= -->

        <div class="col-md-8">

            <div class="editor-card">

                <div
                        class="d-flex
                        justify-content-between
                        align-items-center
                        mb-3">

                    <h4>

                        Live Preview

                    </h4>

                    <span
                            class="badge bg-primary">

                        400 × 400

                    </span>

                </div>

                <!-- Preview -->

                <div id="canvasWrapper">

                    <!-- Background -->

                    <img

                            id="backgroundPreview"

                            src="/static/backgrounds/bg_1.jpg">

                    <!-- Fabric Canvas -->

                    <canvas

                            id="editorCanvas"

                            width="400"

                            height="400">

                    </canvas>

                </div>

                <div class="preview-note">

                    Drag image with mouse •
                    Zoom with slider •
                    Change backgrounds instantly

                </div>

            </div>

        </div>

    </div>

</div>

<!-- Fabric JS -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.0/fabric.min.js"></script>

<!-- JavaScript -->

<script src="/static/js/script.js"></script>

</body>

</html>
